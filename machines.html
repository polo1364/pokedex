<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f23">
  <meta name="description" content="全世代招式機圖鑑：依世代瀏覽招式學習器、秘傳機器與招式記錄">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <title>招式機圖鑑｜寶可夢圖鑑</title>
</head>
<body class="machines-page-body">
  <div class="machines-page items-page">
    <header class="items-page-header machines-page-header">
      <div class="items-page-header-top">
        <a href="./index.html" class="guide-back-link">← 返回圖鑑</a>
      </div>
      <h1 class="items-page-title">招式機圖鑑</h1>
      <p class="items-page-subtitle">依世代瀏覽招式學習器、秘傳機器與招式記錄</p>
      <div class="items-toolbar machines-toolbar">
        <input type="search" class="search-box items-search" id="machineSearchBox" placeholder="搜尋編號或招式名稱…" autocomplete="off">
        <p class="items-count" id="machinesCount" aria-live="polite"></p>
      </div>
      <nav class="machines-kind-nav" id="machinesKindNav" aria-label="種類篩選"></nav>
      <nav class="items-gen-nav machines-gen-nav" id="machinesGenNav" aria-label="世代快速跳轉"></nav>
    </header>

    <main class="items-page-main">
      <div id="machinesLoading" class="items-loading loading-container">
        <div class="loader"></div>
        <p id="machinesProgressText" class="progress-text">載入招式機資料中…</p>
        <div class="progress-container"><div class="progress-bar" id="machinesProgressBar"></div></div>
      </div>
      <div id="machinesContentRoot" class="items-content-root" hidden></div>
    </main>
  </div>

  <script type="module" src="/src/machines-main.js"></script>
  <button type="button" id="machinesBackToTop" class="machines-back-to-top back-to-top" aria-label="返回上方" hidden>↑</button>
</body>
</html>
